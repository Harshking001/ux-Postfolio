<!DOCTYPE html>
<html>
    <head>
        <title>Expence Traker</title>
        <link rel="stylesheet" href="style.css">
        <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8025788279703135"
     crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="add-expence-button">+</div>
        <div class="add-transaction">
            <div class="add-transaction_container">
                <div class="cancel"onclick="cancelExpencePopup()"><i class="bi bi-x"></i></div>
                <h2>Add Transaction</h2>
                <p>Description</p>
                <input type="text" class="transaction-input">
                <p>Amount $</p>
                <input type="number" class="transaction-amount">
                <div class="check-income-expence">
                    <div><input type="checkbox" name="check"><label>Income</label></div>
                    <div><input type="checkbox" name="check" ><label>Expence</label></div>

                </div>
                <div class="add-transaction_button" onclick="addTransaction()">Add Transaction</div>
                
            </div>
        </div>
        <main>
            <h1>Expence Traker</h1>
            <div class="balance-container">
                <p>Your Balance</p>
                <h1 class="balance">$2900.00</h1>
                <div class="income-expence">
                    <div class="income">
                        <p>Income</p>
                        <h2 class="income-amount">$2000</h2>
                    </div>
                    <div class='expence'>
                        <p>Expence</p>
                        <h2 class="expence-balance">-$2000</h2>
                    </div>
                </div>
            </div>
            <div class="transaction">
                <h2>Transactions</h2>
                <div class="expence-container">
                    <div class="expence expence"><p>Salary</p><p class="amount">-$0.00</p><button class="delete-expence"><i class="bi bi-x"></i></button></div>
                    <div class="expence income"><p>Salary</p><p class="amount">$0.00</p><button class="delete-expence"><i class="bi bi-x"></i></button></div>
                    <div class="expence expence"><p>Rent</p><p class="amount">-$0.00</p><button class="delete-expence"><i class="bi bi-x"></i></button></div>
                    <div class="expence income"><p>Salary</p><p class="amount">$0.00</p><button class="delete-expence"><i class="bi bi-x"></i></button></div>
                </div>
                <div class="add-expence-container"></div>
            </div>
        </main>

        <script src="main.js"></script>
    </body>
</html>
